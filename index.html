            color: rgba(255, 255, 255, 0.8);
            margin-top: 4px;
            display: block;
            letter-spacing: 0.5px;
        }
        
        .header-quote {
            font-size: 0.85rem;
            font-style: italic;
            text-align: right;
            max-width: 55%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hero p {

            color: #555;

        }
        
        .btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            animation: fadeIn 1.1s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        footer {

            color: white;
            text-align: center;
            padding: 20px;
